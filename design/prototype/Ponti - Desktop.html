<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ponti — Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Schibsted+Grotesk:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; height: 100%; }
  * { box-sizing: border-box; }
  body {
    background: #EAE6E1;
    background-image: radial-gradient(1200px 700px at 50% -10%, #F1EDE8, #E6E1DB 60%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px; overflow: hidden;
    font-family: "Hanken Grotesk", system-ui, sans-serif;
  }

  .ponti-root {
    --font-display: "Schibsted Grotesk", system-ui, sans-serif;
    --font-ui: "Hanken Grotesk", system-ui, sans-serif;
  }
  .ponti-root.theme-light {
    --bg:#FBF7F4; --surface:#FFFFFF; --surface-2:#F4EEEA;
    --ink:#241F22; --muted:#786E72; --border:#ECE2DD;
    --shadow: 0 1px 2px rgba(36,31,34,.05), 0 10px 26px -14px rgba(36,31,34,.18);
  }
  .ponti-root.theme-dark {
    --bg:#1A171A; --surface:#221D21; --surface-2:#2A242A;
    --ink:#F1EAEE; --muted:#A99FA5; --border:#382F36;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 12px 30px -14px rgba(0,0,0,.6);
  }

  .tnum { font-variant-numeric: tabular-nums lining-nums; letter-spacing: -0.012em; }
  /* proportional figures — for single big display amounts (hero / net). Tighter, even rhythm. */
  .pnum { font-variant-numeric: proportional-nums lining-nums; }

  .skel {
    background: linear-gradient(90deg, var(--surface-2) 0%, var(--border) 50%, var(--surface-2) 100%);
    background-size: 200% 100%;
    animation: ponti-shimmer 1.3s ease-in-out infinite;
  }
  @keyframes ponti-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes ponti-spin { to { transform: rotate(360deg); } }
  @keyframes ponti-pop { 0% { transform: scale(.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes ponti-scan { 0%,100% { top: 14%; } 50% { top: 86%; } }

  input::placeholder { color: var(--muted); opacity: .7; }
  button { font-family: inherit; }
  a { -webkit-tap-highlight-color: transparent; }

  /* desktop interaction states */
  .dk-rail-row, .dk-nav-item, .dk-hover-row, .dk-hover-icon, .dk-card-row, .dk-hover-link { transition: background .15s, box-shadow .15s, border-color .15s, opacity .15s; }
  .dk-rail-row:hover { background: var(--surface-2); }
  .dk-rail-row.is-active { background: var(--accent-soft); }
  .dk-nav-item:hover { background: var(--surface); }
  .dk-nav-item.is-active { background: var(--accent-soft); }
  .dk-hover-row:hover { background: var(--surface-2); }
  .dk-hover-icon:hover { background: var(--surface-2); }
  .dk-card-row:hover { border-color: var(--muted) !important; box-shadow: var(--shadow); }
  .dk-hover-link:hover { opacity: .65; }
</style>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="flow.jsx"></script>
<script type="text/babel" src="wallet.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="desktop-screens.jsx"></script>
<script type="text/babel" src="desktop-app.jsx"></script>
</body>
</html>
