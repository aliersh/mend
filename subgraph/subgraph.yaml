specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: PontiFactory
    network: base-sepolia
    source:
      address: '0x17463e06C303e30044609a9a412d7DB4746Cb210'
      abi: PontiFactory
      startBlock: 42590257
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Group
      abis:
        - name: PontiFactory
          file: ../contracts/out/PontiFactory.sol/PontiFactory.json
      eventHandlers:
        - event: GroupCreated(indexed address,indexed address,indexed address)
          handler: handleGroupCreated
      file: ./src/factory.ts
templates:
  - kind: ethereum/contract
    name: PontiGroup
    network: base-sepolia
    source:
      abi: PontiGroup
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Expense
        - Settlement
      abis:
        - name: PontiGroup
          file: ../contracts/out/PontiGroup.sol/PontiGroup.json
      eventHandlers:
        - event: ExpenseAdded(indexed uint256,indexed address,uint256,string,uint64)
          handler: handleExpenseAdded
        - event: ExpenseEdited(indexed uint256,indexed address,uint256,string)
          handler: handleExpenseEdited
        - event: ExpenseDeleted(indexed uint256,indexed address)
          handler: handleExpenseDeleted
        - event: Settled(indexed address,indexed address,uint256)
          handler: handleSettled
      file: ./src/group.ts
