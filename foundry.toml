[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]

# Compiler
solc = "0.8.34"
evm_version = "cancun"

# Optimizer
optimizer = true
optimizer_runs = 200

# Testing
verbosity = 2

# Enables `forge test --fork-url optimism_sepolia`; fork tests read the env var directly.
[rpc_endpoints]
optimism_sepolia = "${OP_SEPOLIA_RPC_URL}"
